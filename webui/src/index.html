<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>DailyJobs</title>
<link rel="stylesheet" type="text/css" href="/internal/insets.css" />
</head>
<body>
<md-list aria-label="top-app-bar" class="top-app-bar">
  <md-list-item>
    <span slot="headline" class="app-title">DailyJobs</span>
    <md-icon-button slot="end" onclick="restart()" title="Restart scheduler" aria-label="Restart scheduler">
      <md-icon>refresh</md-icon>
    </md-icon-button>
  </md-list-item>
</md-list>

<md-tabs aria-label="tabs">
  <md-primary-tab id="tab-jobs" onclick="switchTab('jobs')">Jobs</md-primary-tab>
  <md-primary-tab id="tab-config" onclick="switchTab('config')">Config</md-primary-tab>
</md-tabs>

<div class="tab-page" id="page-jobs">
  <section>
    <div class="section-header">
      <h2>Schedule</h2>
      <span class="count" id="job-count">0</span>
    </div>
    <div class="timeline" id="schedule-list">
      <div class="empty-state">
        <div class="empty-icon">⏰</div>
        <p>No scheduled jobs yet</p>
        <span>Add one below</span>
      </div>
    </div>
  </section>

  <section>
    <div class="section-header"><h2>Built-in Jobs</h2></div>
    <div class="form-card">
      <div class="form-row">
        <md-outlined-text-field label="Time" type="time" id="new-time" value="22:00" class="grow"></md-outlined-text-field>
        <md-outlined-select label="Action" id="new-action" class="grow"></md-outlined-select>
      </div>
      <div class="form-actions">
        <md-filled-button onclick="add()">Add job</md-filled-button>
      </div>
    </div>
  </section>
</div>

<div class="tab-page" id="page-config" style="display:none">
  <section>
    <div class="section-header"><h2>Custom Jobs</h2></div>
    <div class="form-card">
      <md-outlined-text-field label="Script name" id="custom-name" placeholder="my-script (tanpa .sh)" class="full"></md-outlined-text-field>
      <md-outlined-text-field label="Script content" id="custom-args" type="textarea" rows="4" placeholder="#!/system/bin/sh&#10;echo test > /sdcard/log.txt" class="full" style="margin-top:12px"></md-outlined-text-field>
      <div class="form-actions">
        <md-filled-button onclick="addCustom()">Create script</md-filled-button>
      </div>
    </div>
  </section>

  <section style="margin-top:24px">
    <div class="section-header"><h2>Edit Config</h2></div>
    <div class="form-card">
      <md-outlined-text-field label="config.txt" id="config-text" type="textarea" rows="14" placeholder="Loading config..." readonly class="full"></md-outlined-text-field>
      <div class="form-actions">
        <md-outlined-button onclick="loadConfigFile()">Reload</md-outlined-button>
        <md-filled-button onclick="saveConfigFile()">Save &amp; apply</md-filled-button>
      </div>
    </div>
  </section>
</div>

<md-dialog id="edit-dialog">
  <div slot="headline" id="edit-title">Edit job</div>
  <form slot="content" id="edit-form" method="dialog">
    <md-outlined-text-field label="Time" type="time" id="edit-time" class="full"></md-outlined-text-field>
    <label class="switch-row">
      <md-switch id="edit-disabled" aria-label="Enabled"></md-switch>
      <span>Enabled</span>
    </label>
  </form>
  <div slot="actions">
    <md-text-button form="edit-form" value="cancel">Cancel</md-text-button>
    <md-filled-button form="edit-form" value="save" onclick="saveEditFromDialog()">Save</md-filled-button>
  </div>
</md-dialog>

<md-dialog id="delete-dialog">
  <div slot="headline">Delete job?</div>
  <form slot="content" id="delete-form" method="dialog">
    <p style="color:var(--muted);font-size:14px">This cannot be undone.</p>
    <label class="checkbox-row" id="del-file-row" style="display:none">
      <md-checkbox id="del-file" touch-target="wrapper" aria-label="Also delete script file"></md-checkbox>
      <span>Also delete script file</span>
    </label>
  </form>
  <div slot="actions">
    <md-text-button form="delete-form" value="cancel">Cancel</md-text-button>
    <md-filled-button form="delete-form" value="delete" onclick="doDelFromDialog()">Delete</md-filled-button>
  </div>
</md-dialog>

<div class="toast" id="toast"></div>

<script type="module" src="index.js"></script>
</body>
</html>
