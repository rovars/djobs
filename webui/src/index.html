<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>DailyJobs</title>
<link rel="stylesheet" type="text/css" href="/internal/insets.css" />
</head>
<body>

<md-list aria-label="top-app-bar" class="top-app-bar">
  <md-list-item>
    <span slot="headline" class="app-title">DailyJobs</span>
    <span slot="supporting-text" class="app-subtitle">Task scheduler</span>
  </md-list-item>
</md-list>

<div class="tab-page" id="page-jobs">
  <section>
    <div class="timeline" id="schedule-list">
      <div class="timeline-empty">
        <div class="empty-icon">⏰</div>
        <p>No jobs scheduled</p>
        <span class="empty-hint">Tap Add job to get started</span>
      </div>
    </div>
  </section>
</div>

<!-- Add button (full width) -->
<div class="add-button-wrap">
  <md-filled-button class="full-btn" onclick="openAddDialog()">
    Add job
  </md-filled-button>
</div>

<!-- Add dialog -->
<md-dialog id="add-dialog">
  <div slot="headline">New Job</div>
  <form slot="content" id="add-form" method="dialog">
    <md-outlined-text-field label="Time" id="new-time" value="22:00" class="full" placeholder='22:00 or step/15 9-17 * * 1-5'></md-outlined-text-field>
    <md-outlined-text-field label="Command" id="new-cmd" placeholder="svc data disable" class="full" style="margin-top:12px"></md-outlined-text-field>
  </form>
  <div slot="actions">
    <md-text-button form="add-form" value="cancel">Cancel</md-text-button>
    <md-filled-button onclick="doAddFromDialog()">Add</md-filled-button>
  </div>
</md-dialog>

<!-- Edit dialog -->
<md-dialog id="edit-dialog">
  <div slot="headline">Edit job</div>
  <form slot="content" id="edit-form" method="dialog">
    <md-outlined-text-field label="Time" id="edit-time" class="full" placeholder='22:00 or step/15 9-17 * * 1-5'></md-outlined-text-field>
    <md-outlined-text-field label="Command" id="edit-cmd" class="full" style="margin-top:12px"></md-outlined-text-field>
  </form>
  <div slot="actions">
    <md-text-button style="color:#ef4444" onclick="deleteFromEdit()">Delete</md-text-button>
    <md-text-button form="edit-form" value="cancel">Cancel</md-text-button>
    <md-filled-button onclick="saveEditFromDialog()">Save</md-filled-button>
  </div>
</md-dialog>

<!-- Delete dialog -->
<md-dialog id="delete-dialog">
  <div slot="headline">Remove job?</div>
  <form slot="content" id="delete-form" method="dialog">
    <p class="dialog-desc">This entry will be removed from the schedule.</p>
  </form>
  <div slot="actions">
    <md-text-button form="delete-form" value="cancel">Cancel</md-text-button>
    <md-filled-button onclick="doDelFromDialog()">Delete</md-filled-button>
  </div>
</md-dialog>

<div class="toast" id="toast"></div>

<script type="module" src="index.js"></script>
</body>
</html>
