<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>DailyJobs</title>
<link rel="stylesheet" type="text/css" href="/internal/insets.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Header -->
<header class="app-header">
  <div class="app-header-row">
    <div>
      <h1 class="app-title">DailyJobs</h1>
      <p class="app-subtitle">Task scheduler</p>
    </div>
    <button class="btn primary" id="btn-add">+ Add</button>
  </div>
</header>

<!-- Service Status -->
<section class="card" id="service-card">
  <div class="status-row">
    <span class="status-dot" id="status-dot"></span>
    <span class="status-text" id="status-text">Checking...</span>
    <span class="status-pid" id="status-pid"></span>
  </div>
  <div class="status-actions">
    <button class="btn primary" id="btn-start">Start</button>
    <button class="btn primary" id="btn-stop">Stop</button>
    <button class="btn primary" id="btn-refresh">Refresh</button>
  </div>
</section>

<section class="card" id="jobs-card">
  <div class="card-header">
    <h2>Jobs</h2>
    <span class="job-count" id="job-count">0</span>
  </div>
  <div id="job-list"></div>
</section>

<!-- Modal Overlay -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 class="modal-title" id="modal-title">New Job</h3>
    <div class="field">
      <label for="input-time">Time / Cron</label>
      <input id="input-time" placeholder='22:00 or 0 9 * * mon-fri or @reboot'>
    </div>
    <div class="field">
      <label for="input-cmd">Command</label>
      <input id="input-cmd" placeholder="svc data disable">
    </div>
    <div class="modal-actions">
      <button class="btn flat danger" id="btn-modal-delete">Delete</button>
      <button class="btn flat" id="btn-modal-cancel">Cancel</button>
      <button class="btn primary" id="btn-modal-save">Save</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script type="module" src="app.js"></script>
</body>
</html>
