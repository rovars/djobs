<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>DailyJobs</title>
<link rel="stylesheet" type="text/css" href="/internal/insets.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
</head>
<body>

<md-list aria-label="top-app-bar" class="top-app-bar">
  <md-list-item>
    <span slot="headline" class="app-title">DailyJobs</span>
    <span slot="supporting-text" class="app-subtitle">Task scheduler</span>
  </md-list-item>
</md-list>

<div class="tab-page" id="page-jobs">
  <section>
    <div class="section-header">
    </div>
    <div class="timeline" id="schedule-list">
      <div class="timeline-empty">
        <div class="empty-icon material-symbols-outlined">alarm</div>
        <p>No jobs scheduled</p>
        <span class="empty-hint">Add one below</span>
      </div>
    </div>
  </section>

  <section>
    <div class="section-header"><h2>New Job</h2></div>
    <div class="form-card">
      <div class="form-row">
        <md-outlined-text-field label="Time" id="new-time" value="22:00" placeholder="22:00 or step/15 9-17 * * 1-5" class="grow"></md-outlined-text-field>
        <md-outlined-text-field label="Command" id="new-cmd" placeholder="svc data disable" class="grow"></md-outlined-text-field>
      </div>
      <div class="form-cron-hint">
        <span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle">info</span>
        Accepts <code>HH:MM</code> or cron: <code>step/15 9-17 * * 1-5</code>
      </div>
      <div class="form-actions">
        <md-outlined-button onclick="clearAddForm()">Clear</md-outlined-button>
        <md-filled-button onclick="add()">Add job</md-filled-button>
      </div>
    </div>
  </section>
</div>

<md-dialog id="edit-dialog">
  <div slot="headline" id="edit-title">Edit job</div>
  <form slot="content" id="edit-form" method="dialog">
    <md-outlined-text-field label="Time" id="edit-time" class="full" placeholder="22:00 or cron expression"></md-outlined-text-field>
    <md-outlined-text-field label="Command" id="edit-cmd" class="full" style="margin-top:12px"></md-outlined-text-field>
    <div class="form-cron-hint" style="margin-top:6px">
      <span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle">info</span>
      Accepts <code>HH:MM</code> or full cron expression
    </div>
    <label class="switch-row">
      <md-switch id="edit-disabled" aria-label="Enabled"></md-switch>
      <span>Enabled</span>
    </label>
  </form>
  <div slot="actions">
    <md-text-button form="edit-form" value="cancel">Cancel</md-text-button>
    <md-filled-button form="edit-form" value="save" onclick="saveEditFromDialog()">Save</md-filled-button>
  </div>
</md-dialog>

<md-dialog id="delete-dialog">
  <div slot="headline">Remove job?</div>
  <form slot="content" id="delete-form" method="dialog">
    <p class="dialog-desc">This entry will be removed from the schedule.</p>
  </form>
  <div slot="actions">
    <md-text-button form="delete-form" value="cancel">Cancel</md-text-button>
    <md-filled-button form="delete-form" value="delete" onclick="doDelFromDialog()">Delete</md-filled-button>
  </div>
</md-dialog>

<div class="toast" id="toast"></div>

<script type="module" src="index.js"></script>
</body>
</html>
