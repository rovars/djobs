name: Build

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  MODULE_NAME: 'dailyjobs'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 2

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 'latest'
        cache: 'npm'
        cache-dependency-path: webui/package-lock.json

    - name: Setup Zig
      run: |
        wget -q https://ziglang.org/download/0.14.1/zig-x86_64-linux-0.14.1.tar.xz
        tar -xf zig-x86_64-linux-0.14.1.tar.xz
        echo "$PWD/zig-x86_64-linux-0.14.1" >> $GITHUB_PATH

    - name: Setup ELFkickers (sstrip)
      run: |
        wget -q https://www.muppetlabs.com/~breadbox/pub/software/ELFkickers-3.2.tar.gz
        tar -xzf ELFkickers-3.2.tar.gz
        make -C ELFkickers-3.2
        echo "$PWD/ELFkickers-3.2/bin" >> $GITHUB_PATH

    - name: Build C (ARM + ARM64)
      run: |
        cd native
        chmod +x build.sh
        ./build.sh all
        # Copy both binaries to module/
        cp scheduler_arm64 ../module/scheduler_arm64
        cp scheduler_arm   ../module/scheduler_arm
        # Remove native binaries from module packaging
        rm -f ../module/scheduler 2>/dev/null || true

    - name: Build webui
      run: |
        cd webui
        npm ci
        npm run build
        cp -r dist/* ../module/ 2>/dev/null || true

    - name: Set variables
      run: |
        VERSION=$(grep '^version=' module/module.prop | cut -d= -f2)
        VERSIONCODE=$(grep '^versionCode=' module/module.prop | cut -d= -f2)
        COMMIT_ID=$(git rev-parse --short HEAD)
        echo "ZIP_NAME=${{ env.MODULE_NAME }}_${VERSION}-${VERSIONCODE}-${COMMIT_ID}" >> $GITHUB_ENV

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.ZIP_NAME }}
        path: module/
        if-no-files-found: error
