name: Build

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  MODULE_NAME: 'dailyjobs'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 2

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 'latest'
        cache: 'npm'
        cache-dependency-path: webui/package-lock.json

    - name: Build webui
      run: |
        cd webui
        npm ci
        npm run build

    - name: Set variables
      run: |
        VERSION=$(grep '^version=' module.prop | cut -d= -f2)
        VERSIONCODE=$(grep '^versionCode=' module.prop | cut -d= -f2)
        COMMIT_ID=$(git rev-parse --short HEAD)
        echo "ZIP_NAME=${{ env.MODULE_NAME }}_${VERSION}-${VERSIONCODE}-${COMMIT_ID}" >> $GITHUB_ENV

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.ZIP_NAME }}
        path: 'module'
