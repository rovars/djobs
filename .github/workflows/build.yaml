name: Build

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  MODULE_NAME: 'dailyjobs'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 2

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 'latest'
        cache: 'npm'
        cache-dependency-path: webui/package-lock.json

    - name: Setup Rust + Android targets
      run: |
        rustup target add aarch64-linux-android armv7-linux-androideabi

    - name: Build Rust daemon
      run: |
        cd native
        chmod +x build.sh
        ./build.sh all

    - name: Build webui
      run: |
        cd webui
        npm ci
        npm run build

    - name: Tag module with commit hash
      run: |
        COMMIT_HASH=$(git rev-parse --short HEAD)
        sed -i "s/^name=DailyJobs$/name=DailyJobs [$COMMIT_HASH]/" module/module.prop

    - name: Set variables
      run: |
        VERSION=$(grep '^version=' module/module.prop | cut -d= -f2)
        VERSIONCODE=$(grep '^versionCode=' module/module.prop | cut -d= -f2)
        COMMIT_ID=$(git rev-parse --short HEAD)
        echo "ZIP_NAME=${{ env.MODULE_NAME }}_${VERSION}-${VERSIONCODE}-${COMMIT_ID}" >> $GITHUB_ENV

    - name: Upload binary artifacts
      uses: actions/upload-artifact@v7
      with:
        name: binaries-${{ env.ZIP_NAME }}
        path: module/djobs_bin/
        if-no-files-found: error

    - name: Upload module artifact
      uses: actions/upload-artifact@v7
      with:
        name: module-${{ env.ZIP_NAME }}
        path: module/
        if-no-files-found: error
