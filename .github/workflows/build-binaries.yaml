name: Build Binaries

on:
  push:
    branches:
      - master
    paths:
      - 'native/**'
  workflow_dispatch:

jobs:
  build-c:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64, arm]
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Zig
      run: |
        wget -q https://ziglang.org/download/0.14.1/zig-x86_64-linux-0.14.1.tar.xz
        tar -xf zig-x86_64-linux-0.14.1.tar.xz
        echo "$PWD/zig-x86_64-linux-0.14.1" >> $GITHUB_PATH

    - name: Setup ELFkickers (sstrip)
      run: |
        wget -q https://www.muppetlabs.com/~breadbox/pub/software/ELFkickers-3.2.tar.gz
        tar -xzf ELFkickers-3.2.tar.gz
        make -C ELFkickers-3.2
        echo "$PWD/ELFkickers-3.2/bin" >> $GITHUB_PATH

    - name: Build scheduler (${{ matrix.arch }})
      run: |
        cd native
        ./build.sh ${{ matrix.arch }}
        ls -lh scheduler_${{ matrix.arch }}

    - name: Upload scheduler binary (${{ matrix.arch }})
      uses: actions/upload-artifact@v7
      with:
        name: scheduler_${{ matrix.arch }}
        path: native/scheduler_${{ matrix.arch }}
        if-no-files-found: error

    - name: Upload wakeup_inspector binary (${{ matrix.arch }})
      uses: actions/upload-artifact@v7
      with:
        name: wakeup_inspector_${{ matrix.arch }}
        path: native/wakeup_inspector_${{ matrix.arch }}
        if-no-files-found: error
